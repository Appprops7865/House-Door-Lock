name: Android CI (Automated APK Builder)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant Execute Permissions
      run: |
        chmod +x code/android-build/build-apk.sh 2>/dev/null || true
        chmod +x android-build/build-apk.sh 2>/dev/null || true
        chmod +x android/gradlew 2>/dev/null || true

    - name: Run Figma App Build Script
      run: |
        if [ -f "code/android-build/build-apk.sh" ]; then
          cd code/android-build && ./build-apk.sh
        elif [ -f "android-build/build-apk.sh" ]; then
          cd android-build && ./build-apk.sh
        elif [ -f "android/gradlew" ]; then
          cd android && ./gradlew assembleDebug
        else
          echo "Error: No build script or gradlew found!"
          exit 1
        fi

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Smart-Lock-App
        path: '**/build/outputs/apk/debug/*.apk'
